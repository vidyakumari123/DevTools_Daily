<svg width="860" height="470" viewBox="0 0 860 470" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="860" height="470" fill="#f8fafc"/>
  <text x="430" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Lock-Based Solution</text>
  <text x="430" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">Only one request can process the same ID at a time.</text>

  <rect x="40" y="115" width="150" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="115" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1e3a8a">Request A</text>
  <text x="115" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1e40af">post(1, 10)</text>

  <rect x="40" y="285" width="150" height="70" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="115" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#7f1d1d">Request B</text>
  <text x="115" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#991b1b">post(1, 20)</text>

  <rect x="285" y="100" width="170" height="100" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="370" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#075985">Lock Set</text>
  <text x="370" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0369a1">add ID 1</text>
  <text x="370" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0369a1">now processing</text>

  <rect x="565" y="100" width="180" height="100" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="655" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#14532d">Database</text>
  <text x="655" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">read and create</text>
  <text x="655" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534">return 1</text>

  <rect x="285" y="270" width="170" height="100" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="370" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#7f1d1d">Lock Check</text>
  <text x="370" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#991b1b">ID 1 is locked</text>
  <text x="370" y="351" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#991b1b">return -1</text>

  <rect x="565" y="270" width="180" height="100" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="655" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#78350f">Finally</text>
  <text x="655" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#92400e">remove ID 1</text>
  <text x="655" y="351" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#92400e">from lock set</text>

  <path d="M190 150 C230 150 245 150 285 150" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M455 150 C500 150 520 150 565 150" stroke="#0284c7" stroke-width="3" fill="none" marker-end="url(#arrow-cyan)"/>
  <path d="M655 200 C655 230 655 240 655 270" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#arrow-green)"/>

  <path d="M190 320 C230 320 245 320 285 320" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#arrow-red)"/>
  <path d="M455 320 C500 320 520 320 565 320" stroke="#d97706" stroke-width="3" stroke-dasharray="7 7" fill="none" marker-end="url(#arrow-orange)"/>

  <text x="510" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">A finishes</text>

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0284c7"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d97706"/>
    </marker>
  </defs>
</svg>
