<svg width="860" height="420" viewBox="0 0 860 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="860" height="420" fill="#f8fafc"/>
  <text x="430" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Race Condition Without Lock</text>
  <text x="430" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">Both requests read before either one creates the value.</text>

  <rect x="60" y="100" width="190" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="155" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">Request A</text>
  <text x="155" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e40af">post(1, 10)</text>

  <rect x="60" y="250" width="190" height="70" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="155" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#7f1d1d">Request B</text>
  <text x="155" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#991b1b">post(1, 20)</text>

  <rect x="360" y="170" width="160" height="80" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="440" y="203" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#78350f">DB read(1)</text>
  <text x="440" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#92400e">returns null</text>

  <rect x="630" y="170" width="170" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="715" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#14532d">Both create</text>
  <text x="715" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">same ID conflict</text>

  <path d="M250 135 C300 135 310 190 360 195" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M250 285 C300 285 310 230 360 225" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#arrow-red)"/>
  <path d="M520 205 C565 205 585 205 630 205" stroke="#d97706" stroke-width="3" fill="none" marker-end="url(#arrow-orange)"/>

  <rect x="307" y="305" width="246" height="54" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="430" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#9a3412">Problem</text>
  <text x="430" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9a3412">read and create are not atomic together</text>

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d97706"/>
    </marker>
  </defs>
</svg>
